services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: node dist/server.js
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/document-generator
      REDIS_URL: redis://redis:6379
      WORKER_METRICS_PORT: 0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: node dist/worker-entry.js
    ports:
      - '9464:9464'
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/document-generator
      REDIS_URL: redis://redis:6379
      WORKER_METRICS_PORT: 9464
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
